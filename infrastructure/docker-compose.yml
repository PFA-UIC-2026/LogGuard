version: '3.8'

networks:
  devsentinel-net:
    driver: bridge

volumes:
  jenkins_home:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  postgres_data:
  logguard_data:


services:

  # ─────────────────────────────────────────────
  # JENKINS — CI/CD Brain
  # Access at: http://localhost:8090
  # ─────────────────────────────────────────────
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: devsentinel-jenkins
    user: root
    restart: unless-stopped
    ports:
      - "8090:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - devsentinel-net
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - sonarqube

  # ─────────────────────────────────────────────
  # SONARQUBE — Code Quality Gate
  # Access at: http://localhost:9000
  # Default login: admin / admin
  # ─────────────────────────────────────────────
  sonarqube:
    image: sonarqube:lts-community
    container_name: devsentinel-sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://postgres:5432/sonarqube
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - devsentinel-net
    depends_on:
      - postgres

  # ─────────────────────────────────────────────
  # POSTGRES — Database for SonarQube (internal only)
  # Not exposed to host — SonarQube reaches it via docker network
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: devsentinel-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonarqube
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devsentinel-net

  # ─────────────────────────────────────────────
  # LOGGUARD-DB — Database for the Spring Boot backend
  # Access at: localhost:5432
  # ─────────────────────────────────────────────
  logguard-db:
    image: postgres:15-alpine
    container_name: devsentinel-logguard-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=logguard
      - POSTGRES_PASSWORD=logguard
      - POSTGRES_DB=logguard
    volumes:
      - logguard_data:/var/lib/postgresql/data
    networks:
      - devsentinel-net

  # ─────────────────────────────────────────────
  # BACKEND — Spring Boot LogGuard API
  # Access at: http://localhost:8080
  # Run `mvn package -DskipTests` in /backend before starting
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: devsentinel-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://logguard-db:5432/logguard
      - SPRING_DATASOURCE_USERNAME=logguard
      - SPRING_DATASOURCE_PASSWORD=logguard
    networks:
      - devsentinel-net
    depends_on:
      - logguard-db
